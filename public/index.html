<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Vending Machine</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%23c8262e'/%3E%3Crect x='3' y='3' width='7' height='10' rx='1' fill='%23241a20'/%3E%3Crect x='11' y='3' width='2.5' height='4' rx='0.7' fill='%2353fb7c'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<div class="scene">

  <!-- Scaled stage: the machine is designed at a fixed size and scaled to fit -->
  <div class="stage-wrap" id="stage-wrap">
    <div class="stage" id="stage">

      <div class="machine" id="machine">

        <!-- Backlit marquee -->
        <header class="marquee" id="marquee">
          <div class="marquee__panel">
            <span class="marquee__brand">VENDOMAT</span>
            <span class="marquee__tag">ICE&nbsp;COLD&nbsp;·&nbsp;24/7</span>
          </div>
        </header>

        <div class="machine__body">

          <!-- Glass window with coil slots -->
          <section class="window" aria-label="Products">
            <div class="window__glass" id="window-glass">

              <div class="slot" id="slot-WATER">
                <div class="slot__lane">
                  <div class="slot__products" id="products-WATER"></div>
                  <div class="slot__coil" id="coil-WATER" aria-hidden="true"></div>
                </div>
                <div class="slot__shelf"></div>
                <div class="slot__tag">
                  <span class="slot__code">A1</span>
                  <span class="slot__name">WATER</span>
                  <span class="slot__price" id="price-WATER">—</span>
                  <span class="slot__soldout" id="soldout-WATER" hidden>SOLD OUT</span>
                </div>
              </div>

              <div class="slot" id="slot-JUICE">
                <div class="slot__lane">
                  <div class="slot__products" id="products-JUICE"></div>
                  <div class="slot__coil" id="coil-JUICE" aria-hidden="true"></div>
                </div>
                <div class="slot__shelf"></div>
                <div class="slot__tag">
                  <span class="slot__code">A2</span>
                  <span class="slot__name">JUICE</span>
                  <span class="slot__price" id="price-JUICE">—</span>
                  <span class="slot__soldout" id="soldout-JUICE" hidden>SOLD OUT</span>
                </div>
              </div>

              <div class="slot" id="slot-SODA">
                <div class="slot__lane">
                  <div class="slot__products" id="products-SODA"></div>
                  <div class="slot__coil" id="coil-SODA" aria-hidden="true"></div>
                </div>
                <div class="slot__shelf"></div>
                <div class="slot__tag">
                  <span class="slot__code">A3</span>
                  <span class="slot__name">SODA</span>
                  <span class="slot__price" id="price-SODA">—</span>
                  <span class="slot__soldout" id="soldout-SODA" hidden>SOLD OUT</span>
                </div>
              </div>

              <!-- Dark drop area products fall through -->
              <div class="window__drop" id="window-drop"></div>
              <div class="window__glare" aria-hidden="true"></div>
            </div>
          </section>

          <!-- Control panel -->
          <aside class="panel" aria-label="Controls">

            <div class="led" id="led">
              <div class="led__row">
                <span class="led__label">CREDIT</span>
                <span class="led__credit" id="led-credit">0.00</span>
              </div>
              <div class="led__divider"></div>
              <div class="led__row led__row--msg">
                <span class="led__message" id="led-message" aria-live="polite">INSERT COIN</span>
              </div>
            </div>

            <div class="lamp" id="lamp-change" data-on="false">
              <i class="lamp__dot" aria-hidden="true"></i>
              <span class="lamp__text">USE EXACT CHANGE</span>
            </div>

            <div class="keypad" role="group" aria-label="Product selection">
              <button class="keypad__btn" id="key-WATER" data-product="WATER" disabled>
                <span class="keypad__code">A1</span>
                <i class="keypad__led" aria-hidden="true"></i>
              </button>
              <button class="keypad__btn" id="key-JUICE" data-product="JUICE" disabled>
                <span class="keypad__code">A2</span>
                <i class="keypad__led" aria-hidden="true"></i>
              </button>
              <button class="keypad__btn" id="key-SODA" data-product="SODA" disabled>
                <span class="keypad__code">A3</span>
                <i class="keypad__led" aria-hidden="true"></i>
              </button>
            </div>

            <div class="coin-entry">
              <div class="coin-entry__plate">
                <div class="coin-entry__slot" id="coin-slot">
                  <i class="coin-entry__slit" aria-hidden="true"></i>
                </div>
                <button class="coin-entry__return" id="btn-return" aria-label="Return inserted coins">
                  <i class="coin-entry__lever" aria-hidden="true"></i>
                </button>
              </div>
              <span class="coin-entry__label">COINS · PUSH LEVER TO RETURN</span>
            </div>

            <button class="service-lock" id="tech-key" aria-label="Open service panel">
              <i class="service-lock__keyhole" aria-hidden="true"></i>
              <span class="service-lock__label">SERVICE</span>
            </button>

          </aside>
        </div><!-- /.machine__body -->

        <!-- Delivery bin + coin return cup -->
        <div class="machine__bottom">
          <div class="bin" id="bin">
            <button class="bin__flap" id="bin-flap" aria-label="Collect product">
              <span class="bin__flap-text">PUSH</span>
            </button>
            <div class="bin__cavity" id="bin-cavity" aria-live="polite"></div>
          </div>

          <button class="cup" id="cup" aria-label="Collect returned coins">
            <span class="cup__label">COIN RETURN</span>
            <div class="cup__cavity" id="cup-cavity" aria-live="polite"></div>
          </button>
        </div>

        <div class="machine__base" aria-hidden="true">
          <i class="machine__foot"></i>
          <i class="machine__foot"></i>
        </div>

      </div><!-- /.machine -->

    </div><!-- /.stage -->
  </div><!-- /.stage-wrap -->

  <!-- Coin pocket dock -->
  <footer class="pocket" aria-label="Your coins">
    <span class="pocket__title">YOUR POCKET</span>
    <div class="pocket__coins">
      <button class="pcoin pcoin--silver" data-coin="5"><span class="pcoin__face">5¢</span></button>
      <button class="pcoin pcoin--silver" data-coin="10"><span class="pcoin__face">10¢</span></button>
      <button class="pcoin pcoin--silver" data-coin="25"><span class="pcoin__face">25¢</span></button>
      <button class="pcoin pcoin--gold" data-coin="100"><span class="pcoin__face">€1</span></button>
    </div>
    <button class="pocket__mute" id="btn-mute" aria-label="Toggle sound" data-muted="false">♪</button>
  </footer>

  <!-- Service drawer -->
  <div class="tech-panel" id="tech-panel" aria-hidden="true">
    <div class="tech-panel__inner">
      <h2 class="tech-panel__title">Service Mode</h2>

      <section class="tech-panel__section">
        <h3 class="tech-panel__section-title">Restock Products</h3>
        <div class="tech-panel__grid">
          <label class="tech-label">
            <span>Water</span>
            <input class="tech-input" type="number" min="0" max="20" id="svc-WATER" value="5" />
          </label>
          <label class="tech-label">
            <span>Juice</span>
            <input class="tech-input" type="number" min="0" max="20" id="svc-JUICE" value="5" />
          </label>
          <label class="tech-label">
            <span>Soda</span>
            <input class="tech-input" type="number" min="0" max="20" id="svc-SODA" value="5" />
          </label>
        </div>
      </section>

      <section class="tech-panel__section">
        <h3 class="tech-panel__section-title">Restock Change</h3>
        <div class="tech-panel__grid">
          <label class="tech-label">
            <span>5¢</span>
            <input class="tech-input" type="number" min="0" max="50" id="svc-coin-5" value="10" />
          </label>
          <label class="tech-label">
            <span>10¢</span>
            <input class="tech-input" type="number" min="0" max="50" id="svc-coin-10" value="10" />
          </label>
          <label class="tech-label">
            <span>25¢</span>
            <input class="tech-input" type="number" min="0" max="50" id="svc-coin-25" value="10" />
          </label>
          <label class="tech-label">
            <span>€1</span>
            <input class="tech-input" type="number" min="0" max="50" id="svc-coin-100" value="10" />
          </label>
        </div>
      </section>

      <button class="tech-panel__apply" id="tech-apply">APPLY SERVICE</button>
      <button class="tech-panel__close" id="tech-close" aria-label="Close panel">✕</button>
    </div>
  </div>

  <!-- Effects layer (flying coins, sparks) -->
  <div class="fx-layer" id="fx-layer" aria-hidden="true"></div>

</div><!-- /.scene -->

<script type="module" src="/app.js"></script>
</body>
</html>
